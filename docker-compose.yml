services:
  # ---------------- Infrastructure ----------------
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: MapperDB
      POSTGRES_USER: mapper_user
      POSTGRES_PASSWORD: mapper_pass
    ports:
      - "5432:5432"
    volumes:
      - mapperdb-data:/var/lib/postgresql/data
    networks: [ geomaps-net ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapper_user -d MapperDB"]
      interval: 10s
      retries: 5

  identitydb:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: IdentityDb
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    ports:
      - "5434:5432"
    volumes:
      - identitydb-data:/var/lib/postgresql/data
    networks: [ geomaps-net ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d IdentityDb"]
      interval: 10s
      retries: 5

  proxy:
    build: ./src/Mapper.ReverseProxy
    ports:
      - "8080:8080"
    networks: [ geomaps-net ]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [ geomaps-net ]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    networks: [ geomaps-net ]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks: [ geomaps-net ]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks: [ geomaps-net ]
    depends_on:
      - elasticsearch

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin123!
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks: [ geomaps-net ]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks: [ geomaps-net ]

  # ---------------- Microservices ----------------
  mapper.webapi:
    build:
      context: ./src/Mapper.Core
      dockerfile: Mapper.WebApi/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Database=MapperDB;Username=mapper_user;Password=mapper_pass
      ASPNETCORE_URLS: http://0.0.0.0:5001

      Redis__ConnectionString: redis:6379

      S3__ServiceUrl: http://minio:9000
      S3__AccessKey: minioadmin
      S3__SecretKey: minioadmin
      S3__Bucket: mapper

      Elastic__Url: http://elasticsearch:9200

      Seq__ServerUrl: http://seq:80

      Otel__Endpoint: http://jaeger:4317
    ports:
      - "5001:5001"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    networks: [ geomaps-net ]
    depends_on:
      - db

  identityserver:
    build: ./src/Mapper.IdentityServer
    environment:
      ConnectionStrings__DefaultConnection: Host=identitydb;Database=IdentityDb;Username=identity_user;Password=identity_pass
      ASPNETCORE_URLS: http://0.0.0.0:5002
    ports:
      - "5002:5002"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    networks: [ geomaps-net ]
    depends_on:
      - identitydb

  # ---------------- Observability (optional) ----------------
  prometheus:
    image: prom/prometheus:latest
    networks: [ geomaps-net ]
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.3.1
    networks: [ geomaps-net ]
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

networks:
  geomaps-net:
    driver: bridge

volumes:
  mapperdb-data:
  identitydb-data:
  minio-data:
  es-data:
  seq-data: