# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches:
      - '*'  # Run on all branches
  pull_request:
    branches:
      - 'master'  # Run on pull requests targeting 'master' branch

jobs:
  build:
    runs-on: ubuntu-latest  # Main job runs on Ubuntu

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Set up .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Install required workloads [iOS] on macOS
      - name: Install required workloads [iOS]
        if: runner.os == 'macOS'  # This step will only run on macOS
        run: dotnet workload restore Mapper.iOS/Mapper.iOS.csproj

      # Install required workloads [Android] on Ubuntu
      - name: Install required workloads [Android]
        if: runner.os == 'Linux'  # This step will only run on Linux (Ubuntu)
        run: dotnet workload restore Mapper.Android/Mapper.Android.csproj

      # Restore project dependencies
      - name: Restore dependencies
        run: dotnet restore Mapper.sln

      # Build the solution
      - name: Build the solution
        run: dotnet build Mapper.sln --configuration Release --no-restore

      # Run tests
      - name: Run tests
        run: dotnet test Mapper.Tests/Mapper.Tests.csproj --no-build --verbosity normal

