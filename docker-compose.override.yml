services:
  # ---------------- Infrastructure ----------------
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: MapperDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - type: volume
        source: mapperdb-data
        target: /var/lib/postgresql/data
    networks: [ geomaps-net ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MapperDB"]
      interval: 10s
      retries: 5

  keycloakdb:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5434:5432"
    volumes:
      - type: volume
        source: keycloakdb-data
        target: /var/lib/postgresql/data
    networks: [ geomaps-net ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      retries: 5

  proxy:
    build:
      context: .
      dockerfile: src/Mapper.ReverseProxy/Dockerfile
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
    ports:
      - "8080:8080"
    networks: [ geomaps-net ]
    depends_on:
      - mapper.webapi
      - keycloak

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [ geomaps-net ]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    networks: [ geomaps-net ]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks: [ geomaps-net ]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks: [ geomaps-net ]
    depends_on:
      - elasticsearch

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin123!
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks: [ geomaps-net ]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks: [ geomaps-net ]

  go2rtc:
    image: alexxit/go2rtc:latest
    ports:
      - "1984:1984"     # Web UI
      - "8554:8554"     # RTSP
    networks: [ geomaps-net ]

  # ---------------- Microservices ----------------
  mapper.webapi:
    build:
      context: .
      dockerfile: src/Mapper.Core/Mapper.WebApi/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Database=MapperDB;Username=postgres;Password=pass
      ASPNETCORE_URLS: http://0.0.0.0:5001
      FFMPEG_PATH: /usr/bin/ffmpeg
      Redis__ConnectionString: redis:6379

      S3__ServiceUrl: http://minio:9000
      S3__AccessKey: minioadmin
      S3__SecretKey: minioadmin
      S3__Bucket: mapper

      Elastic__Url: http://elasticsearch:9200

      Seq__ServerUrl: http://seq:80

      Otel__Endpoint: http://jaeger:4317
      Jwt__Authority: http://localhost:8080/auth/realms/mapper
      Jwt__MetadataAddress: http://keycloak:8080/auth/realms/mapper/.well-known/openid-configuration
      Jwt__Audience: api
      SwaggerOAuth__Authority: http://localhost:8080/auth/realms/mapper
      SwaggerOAuth__ClientId: mapper.swagger
    ports:
      - "5001:5001"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    networks: [ geomaps-net ]
    depends_on:
      - db
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloakdb
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: http://localhost:8080/auth
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "5002:8080"
    volumes:
      - ./ops/keycloak/mapper-realm.json:/opt/keycloak/data/import/mapper-realm.json:ro
    networks: [ geomaps-net ]
    depends_on:
      keycloakdb:
        condition: service_healthy

  # mapperfrontend:
  #   build: ../Mapper.Frontend/src/Mapper.Frontend
  #   environment:
  #     REACT_APP_API_URL: http://localhost:8080
  #     REACT_APP_IDENTITY_URL: http://localhost:8080
  #   ports:
  #     - "3001:80"
  #   networks: [ geomaps-net ]

  # ---------------- Observability (optional) ----------------
  prometheus:
    image: prom/prometheus:latest
    networks: [ geomaps-net ]
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.3.1
    networks: [ geomaps-net ]
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

networks:
  geomaps-net:
    name: geomaps-net

volumes:
  mapperdb-data:
    name: mapper_mapperdb-data
  keycloakdb-data:
    name: mapper_keycloakdb-data
  minio-data:
    name: mapper_minio-data
  es-data:
    name: mapper_es-data
  seq-data:
    name: mapper_seq-data
